<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">PrintHub C animated logo</title>
  <desc id="desc">Animated PrintHub logo based on option C, featuring a black letter P, a printing nozzle, and a green printed line.</desc>
  <defs>
    <linearGradient id="blackInk" x1="250" y1="120" x2="720" y2="650" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#202020"/>
      <stop offset=".5" stop-color="#090909"/>
      <stop offset="1" stop-color="#171717"/>
    </linearGradient>
    <linearGradient id="greenInk" x1="330" y1="650" x2="790" y2="650" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00b86b"/>
      <stop offset=".55" stop-color="#14c977"/>
      <stop offset="1" stop-color="#0aa260"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#000000" flood-opacity=".18"/>
    </filter>
    <style>
      .bg { fill: #fff; }
      .main-p { fill: url(#blackInk); filter: url(#softShadow); animation: logoRise 3.6s ease-in-out infinite; transform-origin: 520px 440px; }
      .nozzle { fill: url(#blackInk); filter: url(#softShadow); animation: nozzleTap 3.6s ease-in-out infinite; transform-origin: 330px 575px; }
      .segments rect { fill: #111; animation: segmentIn 3.6s ease-in-out infinite; transform-origin: 330px 570px; }
      .segments rect:nth-child(2) { animation-delay: .08s; }
      .segments rect:nth-child(3) { animation-delay: .16s; }
      .print-line {
        fill: none;
        stroke: url(#greenInk);
        stroke-width: 22;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 450;
        animation: printDraw 3.6s ease-in-out infinite;
      }
      .ink-dot { fill: #14c977; animation: dotPulse 3.6s ease-in-out infinite; transform-origin: 332px 672px; }
      .word { font-family: Inter, Arial, Helvetica, sans-serif; font-weight: 900; filter: url(#softShadow); animation: wordIn 3.6s ease-in-out infinite; }
      @keyframes printDraw {
        0%, 15% { stroke-dashoffset: 450; opacity: .25; }
        42%, 82% { stroke-dashoffset: 0; opacity: 1; }
        100% { stroke-dashoffset: -450; opacity: .35; }
      }
      @keyframes nozzleTap {
        0%, 100% { transform: translateY(-8px); }
        30%, 60% { transform: translateY(4px); }
      }
      @keyframes segmentIn {
        0%, 18% { opacity: 0; transform: translateY(-14px); }
        38%, 86% { opacity: 1; transform: translateY(0); }
        100% { opacity: .45; transform: translateY(6px); }
      }
      @keyframes logoRise {
        0% { opacity: .82; transform: translateY(16px) scale(.985); }
        34%, 86% { opacity: 1; transform: translateY(0) scale(1); }
        100% { opacity: .9; transform: translateY(8px) scale(.99); }
      }
      @keyframes dotPulse {
        0%, 20%, 100% { opacity: .35; transform: scale(.75); }
        42%, 75% { opacity: 1; transform: scale(1); }
      }
      @keyframes wordIn {
        0%, 22% { opacity: .2; transform: translateY(18px); }
        48%, 100% { opacity: 1; transform: translateY(0); }
      }
    </style>
  </defs>

  <rect class="bg" width="1200" height="1200"/>

  <g transform="translate(0 8)">
    <path class="main-p" d="M360 210h260c127 0 216 82 216 198s-89 198-216 198H450V484h168c58 0 94-30 94-76s-36-76-94-76H482v274H360z"/>
    <g class="nozzle">
      <rect x="300" y="536" width="88" height="26" rx="2"/>
      <rect x="300" y="574" width="78" height="22" rx="2"/>
      <path d="M310 610h64l-32 62z"/>
    </g>
    <g class="segments">
      <rect x="292" y="506" width="104" height="20" rx="2"/>
      <rect x="292" y="536" width="92" height="20" rx="2"/>
      <rect x="292" y="566" width="80" height="20" rx="2"/>
    </g>
    <path class="print-line" d="M332 685c0 24 14 34 38 34h392"/>
    <circle class="ink-dot" cx="332" cy="685" r="13"/>
  </g>

  <g class="word" text-anchor="middle">
    <text x="600" y="930" font-size="118">
      <tspan fill="#101010">Print</tspan><tspan fill="#18b86f">Hub</tspan>
    </text>
  </g>
</svg>
