<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户管理 - PrintHub Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css?v=7">
</head>
<body class="admin-body">
<aside class="admin-sidebar">
    <div class="admin-sidebar-top"><a href="dashboard.html" class="admin-sidebar-logo"><img class="admin-logo-img" src="../assets/logo.png" alt="PrintHub"></a></div>
    <div class="admin-sidebar-user"><div class="avatar" style="background:linear-gradient(135deg,#1aab5e,#158f4e);">A</div><div class="info"><h4>Admin</h4><p>管理员</p></div></div>
    <nav class="admin-menu">
        <a href="dashboard.html" class="admin-menu-item"><span class="icon">📊</span>数据面板</a>
        <a href="models.html" class="admin-menu-item"><span class="icon">🧸</span>模型管理</a>
        <a href="orders.html" class="admin-menu-item"><span class="icon">📋</span>订单管理</a>
        <a href="users.html" class="admin-menu-item active"><span class="icon">👤</span>用户管理</a>
        <a href="settings.html" class="admin-menu-item"><span class="icon">⚙️</span>主页编辑</a>
    </nav>
    <div class="admin-sidebar-bottom"><a href="../index.html"><span>←</span> 返回前台</a><a href="#" onclick="doLogout()"><span>×</span> 退出</a></div>
</aside>
<div class="admin-main">
    <header class="admin-header"><h1>👤 用户管理</h1></header>
    <div class="admin-content">
        <table class="admin-table"><thead><tr><th>ID</th><th>用户名</th><th>邮箱</th><th>购买数</th><th>注册时间</th></tr></thead><tbody id="users-list"><tr><td colspan="5" style="text-align:center;">加载中...</td></tr></tbody></table>
        <div style="margin-top:12px;text-align:center;font-size:0.78rem;color:var(--text-muted);" id="page-info"></div>
    </div>
</div>
<script>
let page = 1;
async function loadUsers() {
    const r = await fetch(`/api/admin/users?page=${page}`, {credentials:'same-origin'});
    const d = await r.json();
    if (!d.ok) return alert(d.error||'加载失败');
    document.getElementById('users-list').innerHTML = d.users.length ? d.users.map(u =>
        `<tr><td>#${u.id}</td><td><strong>${u.username||'-'}</strong></td><td>${u.email||'-'}</td><td>${u.order_count||0}</td><td>${(u.created_at||'').slice(0,10)}</td></tr>`
    ).join('') : '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);">暂无用户</td></tr>';
    document.getElementById('page-info').textContent = `共 ${d.total} 个用户`;
}
async function doLogout() { await fetch('/api/admin/logout',{method:'POST',credentials:'same-origin'}); location.href='index.html'; }
loadUsers();
</script>
</body>
</html>
