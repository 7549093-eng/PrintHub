<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据面板 - PrintHub Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css?v=7">
</head>
<body class="admin-body">
<aside class="admin-sidebar">
    <div class="admin-sidebar-top">
        <a href="dashboard.html" class="admin-sidebar-logo"><img class="admin-logo-img" src="../assets/logo.png" alt="PrintHub"></a>
    </div>
    <div class="admin-sidebar-user">
        <div class="avatar" style="background:linear-gradient(135deg,#1aab5e,#158f4e);">A</div>
        <div class="info"><h4>Admin</h4><p>超级管理员</p></div>
    </div>
    <nav class="admin-menu">
        <a href="dashboard.html" class="admin-menu-item active" id="menu-dashboard"><span class="icon">📊</span>数据面板</a>
        <a href="models.html" class="admin-menu-item" id="menu-models"><span class="icon">🧸</span>模型管理</a>
        <a href="orders.html" class="admin-menu-item" id="menu-orders"><span class="icon">📋</span>订单管理</a>
        <a href="users.html" class="admin-menu-item" id="menu-users"><span class="icon">👤</span>用户管理</a>
        <a href="settings.html" class="admin-menu-item" id="menu-settings"><span class="icon">⚙️</span>主页编辑</a>
    </nav>
    <div class="admin-sidebar-bottom">
        <a href="../index.html"><span>←</span> 返回前台</a><a href="#" onclick="doLogout()"><span>×</span> 退出</a>
    </div>
</aside>
<div class="admin-main">
    <header class="admin-header">
        <h1>📊 数据面板</h1>
        <div class="admin-header-actions">
            <span id="current-date" style="color:var(--text-muted);font-size:0.78rem;"></span>
            <a href="models.html" class="admin-btn primary">+ 新增模型</a>
        </div>
    </header>
    <div class="admin-content">
        <div class="admin-stats" id="stats-grid"></div>
        <div class="admin-chart-row">
            <div class="admin-chart-card">
                <h3>📈 最近7天订单趋势</h3>
                <div id="daily-chart" style="display:flex;align-items:flex-end;gap:8px;height:160px;padding:10px 0;"></div>
            </div>
            <div class="admin-chart-card">
                <h3>🥧 模型分类占比</h3>
                <div id="category-chart" style="display:flex;flex-direction:column;gap:8px;padding:10px 0;"></div>
            </div>
        </div>
        <div class="admin-chart-card" style="margin-top:16px;">
            <h3>🕐 最近订单</h3>
            <table class="admin-table" style="margin-top:10px;">
                <thead><tr><th>订单ID</th><th>用户</th><th>模型</th><th>金额</th><th>状态</th><th>时间</th></tr></thead>
                <tbody id="recent-orders"></tbody>
            </table>
        </div>
    </div>
</div>
<script>
const API = {
    async fetch(url) { const r = await fetch(url, {credentials:'same-origin'}); return r.json(); },
    async stats() { return this.fetch('/api/admin/stats'); }
};

async function loadDashboard() {
    try {
        const d = await API.stats();
        if (!d.ok) { if (d.error) alert(d.error); return; }
        // Stats cards
        const stats = [
            {label:'模型总数',value:d.model_count,color:'var(--green)'},
            {label:'上架中',value:d.online_count,color:'var(--green)'},
            {label:'用户总数',value:d.user_count,color:'var(--purple)'},
            {label:'订单总数',value:d.order_count,color:'var(--gold)'},
            {label:'总下载量',value:d.total_downloads,color:'var(--green)'},
            {label:'总营收',value:'¥'+Number(d.total_revenue||0).toLocaleString(),color:'var(--gold)'},
        ];
        document.getElementById('stats-grid').innerHTML = stats.map(s =>
            `<div class="admin-stat-card"><div class="label">${s.label}</div><div class="value" style="color:${s.color}">${s.value}</div></div>`
        ).join('');

        // Daily chart
        const daily = d.daily || [];
        const maxOrders = Math.max(1, ...daily.map(x=>x.orders));
        document.getElementById('daily-chart').innerHTML = daily.map(day => {
            const h = Math.max(4, (day.orders/maxOrders*140));
            return `<div style="flex:1;text-align:center;"><div style="background:linear-gradient(180deg,var(--green),var(--green-dim));height:${h}px;border-radius:6px 6px 0 0;min-width:20px;" title="${day.date}: ${day.orders}单"></div><small style="font-size:0.6rem;color:var(--text-muted);">${day.date.slice(5)}</small><small style="font-size:0.6rem;color:var(--green);">${day.orders}</small></div>`;
        }).join('');

        // Category chart
        const cats = d.categories || [];
        const totalCats = cats.reduce((s,c)=>s+c.n,0) || 1;
        document.getElementById('category-chart').innerHTML = cats.map(c =>
            `<div style="display:flex;align-items:center;gap:8px;"><span style="width:60px;font-size:0.78rem;">${c.category}</span><div style="flex:1;background:var(--bg-card);border-radius:4px;height:20px;"><div style="background:var(--green);height:100%;border-radius:4px;width:${(c.n/totalCats*100)}%;min-width:2px;"></div></div><span style="font-size:0.72rem;color:var(--text-muted);width:30px;">${c.n}</span></div>`
        ).join('');

        // Recent orders
        const orders = d.recent_orders || [];
        document.getElementById('recent-orders').innerHTML = orders.map(o =>
            `<tr><td>#${o.id}</td><td>${o.username||'-'}</td><td>${o.model_title||'模型#'+o.model_id}</td><td>¥${o.amount}</td><td><span class="status-${o.status}">${o.status==='completed'?'已完成':o.status==='processing'?'处理中':o.status}</span></td><td>${(o.created_at||'').slice(0,16)}</td></tr>`
        ).join('') || '<tr><td colspan="6" style="text-align:center;color:var(--text-muted);">暂无订单</td></tr>';

        document.getElementById('current-date').textContent = new Date().toISOString().slice(0,10);
    } catch(e) { console.error(e); }
}

async function doLogout() {
    await fetch('/api/admin/logout', {method:'POST',credentials:'same-origin'});
    location.href = 'index.html';
}

loadDashboard();
</script>
</body>
</html>
