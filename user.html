<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户中心 - PrintHub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/global.css?v=9">
<style>
.user-layout { display: flex; min-height: 100vh; padding-top: 100px; padding-right: 48px; padding-left: 108px; max-width: 1400px; margin: 0 auto; }
.user-sidebar { width: 240px; flex-shrink: 0; padding-right: 28px; }
.user-sidebar-user { display: flex; align-items: center; gap: 10px; padding: 18px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 20px; }
.user-sidebar-user .avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg,var(--green),var(--green-dim)); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.1rem; color: var(--bg); flex-shrink: 0; }
.user-sidebar-user .info h4 { font-size: 0.9rem; font-weight: 700; }
.user-sidebar-user .info p { font-size: 0.72rem; color: var(--text-muted); }
.user-menu-group { margin-bottom: 20px; }
.user-menu-title { font-size: 0.72rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; padding: 0 10px; }
.user-menu-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; color: var(--text-secondary); text-decoration: none; font-size: 0.88rem; font-weight: 500; transition: all 0.3s; cursor: pointer; font-family: 'Noto Sans SC',sans-serif; }
.user-menu-item:hover, .user-menu-item.active { background: var(--bg-card); color: var(--green); }
.user-menu-item.logout { color: #e74c3c; }
.user-menu-item.logout:hover { background: rgba(231,76,60,0.1); color: #e74c3c; }
.user-content { flex: 1; }
.user-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; margin-bottom: 28px; }
.user-stat-card { padding: 20px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; }
.user-stat-card .label { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 6px; font-family: 'Noto Sans SC',sans-serif; }
.user-stat-card .value { font-size: 1.7rem; font-weight: 800; color: var(--green); }
.user-stat-card .value.gold { color: var(--gold); }
.user-stat-card .sub { font-size: 0.72rem; color: var(--text-muted); margin-top: 4px; }
.user-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
.user-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 16px; font-family: 'Noto Sans SC',sans-serif; }
.user-list-item { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border); }
.user-list-item:last-child { border-bottom: none; }
.user-list-img { width: 56px; height: 44px; background: var(--bg-elevated); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; flex-shrink: 0; overflow: hidden; }
.user-list-img img { width: 100%; height: 100%; object-fit: cover; }
.user-list-info { flex: 1; }
.user-list-info h4 { font-size: 0.88rem; font-weight: 600; margin-bottom: 3px; font-family: 'Noto Sans SC',sans-serif; }
.user-list-info p { font-size: 0.72rem; color: var(--text-muted); }
.user-action { padding: 6px 12px; background: var(--green); color: var(--bg); border: none; border-radius: 6px; font-size: 0.72rem; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-block; }
.user-action:hover { opacity: 0.9; }
.login-prompt { text-align: center; padding: 80px 20px; }
.login-prompt h2 { font-size: 1.4rem; margin-bottom: 10px; font-family: 'Noto Sans SC',sans-serif; }
.login-prompt p { color: var(--text-muted); margin-bottom: 24px; font-family: 'Noto Sans SC',sans-serif; }
.login-prompt .btn { display: inline-block; padding: 12px 32px; background: var(--green); color: var(--bg); border-radius: 10px; font-weight: 700; text-decoration: none; font-size: 0.95rem; }
.loading { text-align: center; padding: 60px; color: var(--text-muted); }
@media (max-width: 1024px) { .user-sidebar { display: none; } .user-layout { padding-right: 16px; padding-left: 80px; } .user-stats { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 768px) { .left-nav { display: none; } .top-bar { left: 0; } .user-layout { padding-left: 16px; padding-top: 92px; } .user-stats { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<nav class="left-nav">
<a href="index.html" class="left-nav-top"><img class="site-logo-icon" src="assets/logo.png" alt="PrintHub"></a>
<a href="index.html" class="left-nav-item"><span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span><span class="label">首页</span></a>
<a href="home.html" class="left-nav-item"><span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg></span><span class="label">市场</span></a>
<a href="search.html" class="left-nav-item"><span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span><span class="label">搜索</span></a>
<a href="user.html" class="left-nav-item"><span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></span><span class="label">上传</span></a>
<a href="user.html" class="left-nav-item active"><span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span><span class="label">用户</span></a>
</nav>

<div class="top-bar">
    <div class="top-bar-search-wrap">
        <a href="index.html" class="top-bar-logo"><img class="site-logo-wordmark" src="assets/logo.png" alt="PrintHub"></a>
        <input type="text" class="top-bar-search" placeholder="搜索模型、创作者、标签...">
        <button class="top-bar-search-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
    </div>
    <a href="login.html" id="top-user-btn" class="top-bar-user">登</a>
</div>

<main class="user-layout" id="user-main"><div class="loading">加载中...</div></main>

<script>
(function() {
  var user = null;

  async function init() {
    // Check login
    try {
      var r = await fetch('/api/user/me');
      var d = await r.json();
      if (d.ok) user = d.user;
    } catch(e) { user = null; }

    // Update top bar
    var topBtn = document.getElementById('top-user-btn');
    if (user) {
      topBtn.textContent = (user.username||'U')[0].toUpperCase();
      topBtn.href = 'user.html';
    } else {
      topBtn.textContent = '登';
      topBtn.href = 'login.html';
    }

    render();
  }

  function thumb(m) {
    if (m.image && (m.image.indexOf('assets/')===0 || m.image.indexOf('data/')===0)) {
      return '<img src="'+m.image+'" style="width:100%;height:100%;object-fit:cover;" alt="">';
    }
    return '<div style="font-size:1.4rem;">'+(m.image||'📦')+'</div>';
  }

  async function renderLoggedIn() {
    // Load models for "recent" display
    var models = [];
    try {
      var r = await fetch('/api/models?sort=newest&page_size=6');
      var d = await r.json();
      models = d.models || [];
    } catch(e) {}

    var freeCount = 0, paidCount = 0;
    models.forEach(function(m) { if (Number(m.price||0)<=0) freeCount++; else paidCount++; });

    var html = '';
    // Sidebar
    html += '<aside class="user-sidebar">';
    html += '<div class="user-sidebar-user">';
    html += '<div class="avatar">'+(user.username||'U')[0].toUpperCase()+'</div>';
    html += '<div class="info"><h4>'+user.username+'</h4><p>'+ (user.email||'') +'</p></div>';
    html += '</div>';
    html += '<div class="user-menu-group">';
    html += '<div class="user-menu-title">我的内容</div>';
    html += '<a href="#" class="user-menu-item active">📦 已购买模型</a>';
    html += '<a href="#" class="user-menu-item">⬇ 下载记录</a>';
    html += '<a href="#" class="user-menu-item">❤ 收藏夹</a>';
    html += '</div>';
    html += '<div class="user-menu-group">';
    html += '<div class="user-menu-title">账户</div>';
    html += '<a href="#" class="user-menu-item">👤 个人资料</a>';
    html += '<a href="#" class="user-menu-item">👑 会员状态</a>';
    html += '<a href="#" class="user-menu-item logout" id="logout-btn">🚪 退出登录</a>';
    html += '</div>';
    html += '</aside>';

    // Main content
    html += '<div class="user-content">';
    html += '<div class="user-stats">';
    html += '<div class="user-stat-card"><div class="label">平台模型</div><div class="value">20</div><div class="sub">免费 '+freeCount+' / 付费 '+paidCount+'</div></div>';
    html += '<div class="user-stat-card"><div class="label">下载次数</div><div class="value">—</div><div class="sub">即将开放</div></div>';
    html += '<div class="user-stat-card"><div class="label">收藏模型</div><div class="value gold">—</div><div class="sub">即将开放</div></div>';
    html += '<div class="user-stat-card"><div class="label">注册时间</div><div class="value" style="font-size:1rem;">'+(user.created_at||'近期').slice(0,10)+'</div><div class="sub">欢迎加入 PrintHub</div></div>';
    html += '</div>';

    // Recent models
    html += '<div class="user-card"><h3>📦 最新上架模型</h3>';
    models.forEach(function(m) {
      var isFree = Number(m.price||0) <= 0;
      html += '<div class="user-list-item">';
      html += '<div class="user-list-img">'+thumb(m)+'</div>';
      html += '<div class="user-list-info"><h4>'+m.title+'</h4><p>'+m.file_format+' · '+(isFree?'免费':'¥'+m.price)+' · '+m.author+'</p></div>';
      html += '<div class="user-list-actions">';
      html += '<a href="model.html?id='+m.id+'" class="user-action">查看</a>';
      if (m.file_path) html += '<a href="/api/models/'+m.id+'/download" class="user-action" style="background:transparent;color:var(--green);border:1px solid var(--green);">下载</a>';
      html += '</div></div>';
    });
    html += '</div>';
    html += '</div>';

    return html;
  }

  function renderLoggedOut() {
    return '<div class="login-prompt">'+
      '<div style="font-size:4rem;margin-bottom:20px;">🔒</div>'+
      '<h2>请先登录</h2>'+
      '<p>登录后查看已购买模型、下载记录和个人资料</p>'+
      '<a href="login.html" class="btn">登录 / 注册</a>'+
      '</div>';
  }

  async function render() {
    var main = document.getElementById('user-main');
    if (user) {
      main.innerHTML = await renderLoggedIn();
      // Logout handler
      document.getElementById('logout-btn').addEventListener('click', async function(e) {
        e.preventDefault();
        await fetch('/api/user/logout', { method: 'POST' });
        user = null;
        document.getElementById('top-user-btn').textContent = '登';
        document.getElementById('top-user-btn').href = 'login.html';
        render();
      });
    } else {
      main.innerHTML = renderLoggedOut();
    }
  }

  init();
})();
</script>
</body>
</html>
